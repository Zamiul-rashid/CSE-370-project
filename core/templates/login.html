{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 100px auto;">
    <div class="card">
        <h2 style="color: #00d4ff; text-align: center; margin-bottom: 20px;">Login</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Sign In</button>
        </form>
        <p style="margin-top:20px; font-size:0.8rem; color:#888; text-align:center;">
            Available Roles: Admin, Coach, Player, Guest (Add them via /admin)
        </p>
    </div>
</div>
{% endblock %}
